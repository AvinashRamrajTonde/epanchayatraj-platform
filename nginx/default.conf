# ─────────────────────────────────────────────────────────────
# Nginx Gateway for GPMH Platform
# Routes subdomains to frontend/backend services
# ─────────────────────────────────────────────────────────────

# Backend upstream
upstream backend {
    server backend:5000;
}

# Frontend upstream
upstream frontend {
    server frontend:80;
}

# ─── API / SuperAdmin backend (admin.gpmh.local) ────────────
server {
    listen 80;
    server_name admin.gpmh.local superadmin.gpmh.local;

    client_max_body_size 10M;

    # API calls → backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files → backend
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        expires 7d;
    }

    # Everything else → frontend SPA
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ─── Village subdomains (*.gpmh.local) ──────────────────────
server {
    listen 80;
    server_name *.gpmh.local;

    client_max_body_size 10M;

    # API calls → backend
    location /api/ {
