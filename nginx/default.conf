# ─────────────────────────────────────────────────────────────
# Nginx Gateway for GPMH Platform
# Routes subdomains to frontend/backend services
# ─────────────────────────────────────────────────────────────

# Detect ALL crawlers: search engines + social link-preview bots
# These get served the backend OG/SEO HTML instead of the bare React SPA shell
map $http_user_agent $is_crawler {
    default                   0;
    # Search engines
    ~*Googlebot               1;
    ~*Googlebot-Image         1;
    ~*Googlebot-News          1;
    ~*Google-InspectionTool   1;
    ~*bingbot                 1;
    ~*msnbot                  1;
    ~*Slurp                   1;  # Yahoo
    ~*DuckDuckBot             1;
    ~*Baiduspider             1;
    ~*YandexBot               1;
    ~*Sogou                   1;
    ~*AhrefsBot               1;
    ~*SemrushBot              1;
    ~*MJ12bot                 1;
    ~*DotBot                  1;
    ~*rogerbot                1;
    ~*ia_archiver             1;
    ~*archive.org_bot         1;
    # Social link-preview crawlers
    ~*WhatsApp                1;
    ~*facebookexternalhit     1;
    ~*Facebot                 1;
    ~*Twitterbot              1;
    ~*LinkedInBot             1;
    ~*Slackbot                1;
    ~*TelegramBot             1;
    ~*Discordbot              1;
    ~*Pinterest               1;
    ~*redditbot               1;
}

# Backend upstream
upstream backend {
    server backend:5000;
}

# Frontend upstream
upstream frontend {
    server frontend:80;
}

# ─── API / SuperAdmin backend (admin.gpmh.local) ────────────
server {
    listen 80;
    server_name admin.gpmh.local superadmin.gpmh.local;

    client_max_body_size 10M;

    # API calls → backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files → backend
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        expires 7d;
    }

    # Everything else → frontend SPA
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ─── Village subdomains (*.gpmh.local) ──────────────────────
server {
    listen 80;
    server_name *.gpmh.local;

    client_max_body_size 10M;

    # API calls → backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files → backend
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        expires 7d;
    }

    # Sitemap + robots → backend (dynamic per-village)
    location = /sitemap.xml {
        proxy_pass http://backend/api/public/sitemap.xml;
        proxy_set_header Host $host;
    }
    location = /robots.txt {
        proxy_pass http://backend/api/public/robots.txt;
        proxy_set_header Host $host;
    }

    # Crawlers get full SEO HTML from backend; humans get the SPA
    location / {
        if ($is_crawler) {
            rewrite ^ /api/public/og last;
        }
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ─── Default / bare domain ──────────────────────────────────
server {
    listen 80 default_server;
    server_name gpmh.local localhost;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        expires 7d;
    }

    # Sitemap + robots → backend (dynamic per-village)
    location = /sitemap.xml {
        proxy_pass http://backend/api/public/sitemap.xml;
        proxy_set_header Host $host;
    }
    location = /robots.txt {
        proxy_pass http://backend/api/public/robots.txt;
        proxy_set_header Host $host;
    }

    # Crawlers get full SEO HTML from backend; humans get the SPA
    location / {
        if ($is_crawler) {
            rewrite ^ /api/public/og last;
        }
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
